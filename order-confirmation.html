<!doctype html>
<html lang="sv" data-theme="light" data-accent="green">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Orderkonfirmation — Däckcentrum</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles/tokens.css?v=12"/>
<link rel="stylesheet" href="styles/header.css?v=12"/>
<style>
  body { background: #f9fafb; }
  .confirmation-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
  @media (max-width: 768px) { .confirmation-container { padding: 24px 20px; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="topbar"></div>
<div id="header"></div>

<div class="confirmation-container">
  <div id="confirmation-content"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="lib/init-lang.js"></script>
<script src="lib/cart-manager.js"></script>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/header.jsx"></script>
<script type="text/babel" src="components/cart-drawer.jsx"></script>
<script type="text/babel" src="pages/OrderConfirmationPage.jsx"></script>

<script type="text/babel">
  // Render topbar
  const topbarRoot = document.getElementById('topbar');
  if (topbarRoot) {
    ReactDOM.createRoot(topbarRoot).render(<DCTopBar />);
  }

  // Render header with cart drawer root
  const headerRoot = document.getElementById('header');
  if (headerRoot) {
    ReactDOM.createRoot(headerRoot).render(
      <>
        <DCHeader activeIndex={0} />
        <div id="cart-drawer-root" style={{display: 'contents'}}></div>
      </>
    );

    setTimeout(() => {
      const cartRoot = document.getElementById('cart-drawer-root');
      if (cartRoot) {
        ReactDOM.createRoot(cartRoot).render(<DCCartDrawer/>);
      }
    }, 100);
  }

  // Render confirmation content
  ReactDOM.createRoot(document.getElementById('confirmation-content')).render(
    <OrderConfirmationPage />
  );
</script>
</body>
</html>
