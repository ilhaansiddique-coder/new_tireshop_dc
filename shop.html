<!doctype html>
<html lang="sv" data-theme="light" data-accent="green">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Shop — Däckcentrum</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles/tokens.css?v=12"/>
<link rel="stylesheet" href="styles/header.css?v=12"/>
<style>
  html, body { overflow-x: hidden; width: 100%; }
  body { background: #f9fafb; }
  .shop-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
  .shop-header { margin-bottom: 40px; }
  .shop-header h1 { margin: 0 0 8px 0; font-size: 32px; font-weight: 700; }
  .shop-header p { margin: 0; font-size: 16px; color: #6b7280; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 24px; }
  .loading { text-align: center; padding: 60px 20px; font-size: 16px; color: #6b7280; }
  .error { background: #fef2f2; border: 1px solid #fee2e2; padding: 20px; border-radius: 8px; color: #991b1b; margin: 20px 0; }
  @media (max-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
</style>
</head>
<body>
<div id="topbar"></div>
<div id="header"></div>

<div class="shop-container">
  <div class="shop-header">
    <h1 id="shop-title">Shop</h1>
    <p id="shop-desc">Browse and add products to your cart</p>
  </div>

  <div id="shop-content"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="lib/init-lang.js"></script>
<script src="lib/cart-manager.js"></script>
<script src="lib/topbar-scroll.js"></script>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/mini-cart.jsx"></script>
<script type="text/babel" src="components/header.jsx"></script>
<script type="text/babel" src="components/product-card.jsx"></script>
<script type="text/babel" src="pages/ShopPage.jsx"></script>

<script type="text/babel">
  // Render topbar
  const topbarRoot = document.getElementById('topbar');
  if (topbarRoot) {
    ReactDOM.createRoot(topbarRoot).render(<DCTopBar />);
  }

  // Render header
  const headerRoot = document.getElementById('header');
  if (headerRoot) {
    ReactDOM.createRoot(headerRoot).render(
      <DCHeader activeIndex={0} />
    );

    // Render mini cart in the header's cart root
    setTimeout(() => {
      const cartRoot = document.getElementById('mini-cart-root');
      if (cartRoot) {
        ReactDOM.createRoot(cartRoot).render(<DCMiniCart/>);
      }
    }, 100);
  }

  // Render shop content
  ReactDOM.createRoot(document.getElementById('shop-content')).render(
    <ShopPage />
  );
</script>
</body>
</html>
