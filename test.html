<!doctype html>
<html>
<head>
<title>React Test</title>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel">
  console.log('✅ Babel is working!');
  console.log('✅ React version:', React.version);

  function TestApp() {
    return (
      <div style={{padding: '20px', fontSize: '24px', fontFamily: 'Arial'}}>
        <h1>✅ React is working!</h1>
        <p>If you see this, React and Babel are functioning correctly.</p>
      </div>
    );
  }

  setTimeout(() => {
    console.log('🚀 Rendering test app...');
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TestApp />);
    console.log('✅ Test app rendered!');
  }, 500);
</script>
</body>
</html>
